<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI销售陪练系统 · 功能模块图</title>
<style>
  :root{
    --primary:#3d4f6b;
    --accent:#b8976e;
    --bg:#f7f8fa;
    --card:#ffffff;
    --line:#d8dde6;
    --text:#2c3440;
    --muted:#7a8494;
    --serif:"Songti SC","SimSun","Noto Serif SC",Georgia,serif;
    --sans:"PingFang SC","Microsoft YaHei","Noto Sans SC",-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;padding:32px 20px 60px;}
  header{max-width:1180px;margin:0 auto 8px;text-align:center;}
  header h1{font-family:var(--serif);font-size:30px;font-weight:700;color:var(--primary);letter-spacing:1px;}
  header .sub{color:var(--muted);font-size:14px;margin-top:6px;}

  .legend{
    max-width:1180px;margin:18px auto 28px;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:14px 20px;display:flex;flex-wrap:wrap;gap:18px;align-items:center;
    font-size:13px;color:var(--muted);
  }
  .legend .item{display:flex;align-items:center;gap:7px;}
  .legend .dot{width:14px;height:14px;border-radius:4px;display:inline-block;}
  .dot.pre{background:#9aa7bd;}
  .dot.module{background:var(--primary);}
  .dot.sub{background:var(--accent);}
  .dot.fn{background:#eef1f6;border:1px solid var(--line);}
  .legend .note{margin-left:auto;color:var(--accent);font-weight:600;}

  .grid{
    max-width:1180px;margin:0 auto;display:grid;
    grid-template-columns:repeat(3,1fr);gap:16px;align-items:start;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-top:5px solid var(--primary);
    border-radius:10px;padding:16px 18px;transition:box-shadow .2s,transform .2s;
  }
  .card:hover{box-shadow:0 6px 20px rgba(61,79,107,.12);transform:translateY(-2px);}
  .card.pre{border-top-color:#9aa7bd;}
  .card .chead{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .card .cidx{
    background:var(--primary);color:#fff;font-size:12px;font-weight:700;width:24px;height:24px;
    border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  }
  .card.pre .cidx{background:#9aa7bd;}
  .card .ctitle{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--primary);}
  .card.pre .ctitle{color:#6b7689;}

  .fnlist{display:grid;gap:6px;}
  .fn{
    font-size:13px;color:var(--text);background:#fbfcfe;border:1px solid var(--line);
    border-radius:6px;padding:6px 10px;position:relative;padding-left:20px;
  }
  .fn::before{content:"";position:absolute;left:9px;top:12px;width:5px;height:5px;border-radius:50%;background:var(--accent);}

  .submod{
    margin-top:12px;border:1px dashed var(--accent);border-radius:8px;overflow:hidden;
  }
  .submod>.shead{
    display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;user-select:none;
    background:#faf6f1;font-weight:700;color:var(--accent);font-size:14px;
  }
  .submod>.shead .stoggle{margin-left:auto;font-size:12px;color:var(--muted);transition:transform .25s;}
  .submod.collapsed>.shead .stoggle{transform:rotate(-90deg);}
  .submod>.sbody{padding:8px 12px 12px;display:grid;gap:6px;}
  .submod.collapsed>.sbody{display:none;}

  footer{
    max-width:1180px;margin:34px auto 0;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:18px 22px;
  }
  footer h3{font-family:var(--serif);color:var(--primary);font-size:16px;margin-bottom:10px;}
  footer .map{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:8px;font-size:13px;}
  footer .map .row{display:flex;align-items:center;gap:8px;}
  footer .map .arrow{color:var(--accent);font-weight:700;}
  footer .map .l{color:var(--primary);font-weight:600;}
  footer .map .r{color:var(--muted);}

  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:600px){
    body{padding:20px 12px 40px;}
    header h1{font-size:23px;}
    .grid{grid-template-columns:1fr;}
    .legend{font-size:12px;gap:12px;}
    .legend .note{margin-left:0;width:100%;}
  }
</style>
</head>
<body>
<header>
  <h1>AI销售陪练系统 · 功能模块图</h1>
  <div class="sub">6 大模块 · 含任务 Tab 3 个子模块 · 跨模块公共功能</div>
</header>

<div class="legend">
  <div class="item"><span class="dot pre"></span>前置模块</div>
  <div class="item"><span class="dot module"></span>功能模块</div>
  <div class="item"><span class="dot sub"></span>子模块</div>
  <div class="item"><span class="dot fn"></span>功能点</div>
  <div class="note">点击「任务」Tab 内子模块标题可展开 / 折叠</div>
</div>

<div class="grid" id="grid"></div>

<footer>
  <h3>两图对应关系</h3>
  <div class="map">
    <div class="row"><span class="l">知识库域</span><span class="arrow">↔</span><span class="r">话术提示（陪练执行）</span></div>
    <div class="row"><span class="l">任务与激励域</span><span class="arrow">↔</span><span class="r">任务 Tab</span></div>
    <div class="row"><span class="l">评估域</span><span class="arrow">↔</span><span class="r">回顾 Tab</span></div>
    <div class="row"><span class="l">用户域</span><span class="arrow">↔</span><span class="r">我的 Tab / 登录</span></div>
    <div class="row"><span class="l">陪练会话域</span><span class="arrow">↔</span><span class="r">陪练执行（对话界面）</span></div>
    <div class="row"><span class="l">角色与场景域</span><span class="arrow">↔</span><span class="r">场景选择 / 角色面板</span></div>
    <div class="row"><span class="l">数据统计域</span><span class="arrow">↔</span><span class="r">经理视图 / 对比分析</span></div>
    <div class="row"><span class="l">系统配置域</span><span class="arrow">↔</span><span class="r">后台管理 / 培训计划</span></div>
  </div>
</footer>

<script>
const MODULES = [
  { idx:"0", title:"登录与身份认证", pre:true, fns:[
    "安全验证",
    "验证码（首次或异常登录）",
    "记住密码 / 自动登录",
    "角色状态"
  ]},
  { idx:"1", title:"陪练执行（对话界面）", fns:[
    "发送消息",
    "引用回复（针对某角色发言）",
    "步骤清单",
    "状态（待开始 / 进行中 / 已完成）",
    "手动标记",
    "高级选项",
    "话术提示",
    "暂停 / 恢复陪练",
    "达成成交或角色全部退出",
    "重新练习（一键启动相同难度与场景）"
  ]},
  { idx:"2", title:"「任务」Tab", fns:[], subs:[
    { name:"2.1 任务启动", fns:[
      "名称、奖励、截止时间",
      "领取奖励",
      "积分 / 徽章",
      "去练习",
      "自动匹配对应场景",
      "任务（里程碑）",
      "称号展示（如“异议处理专家”）",
      "任务依赖图（破冰+需求挖掘 → FABE+价格异议 → …）",
      "当前进行中任务",
      "实时状态",
      "培训计划（TaskSystem可视化）",
      "任务完成提醒（即时推送 / 激励提示）"
    ]},
    { name:"2.2 经理分配任务提醒", fns:[
      "优先级标识",
      "排序方式（按完成率排序 / 按平均分排序）",
      "搜索筛选",
      "薄弱维度"
    ]},
    { name:"2.3 经理视角（需身份切换）", fns:[
      "选择成员（单选或多选）",
      "选择场景与难度（精准匹配能力短板）",
      "发送任务",
      "团队完成报表"
    ]}
  ]},
  { idx:"3", title:"「回顾」Tab", fns:[
    "周 / 月视图",
    "单日详情（点击查看当天练习列表，按日期排序，含对话摘要）",
    "评估报告",
    "个人档案（总练习次数、总时长、近一次练习时间与得分）",
    "难度最高分（数值标出）",
    "自动标出最低分维度 + 按钮（去练习）",
    "次数 / 得分折线图",
    "柱状图展示",
    "激励竞争机制"
  ]},
  { idx:"4", title:"「我的」Tab", fns:[
    "修改姓名 / 昵称",
    "安全登录（账号安全）",
    "收藏话术",
    "查看版本",
    "隐私政策 / 用户协议",
    "通知设置"
  ]},
  { idx:"5", title:"跨模块公共功能（全局）", fns:[
    "消息通知（标记已读 / 全部已读）",
    "搜索（全局：练习记录、任务、话术）",
    "切换身份（学员 ↔ 经理，如果拥有双角色）"
  ]}
];

const grid = document.getElementById('grid');
MODULES.forEach(m=>{
  const card = document.createElement('div');
  card.className = 'card' + (m.pre?' pre':'');
  let inner = `<div class="chead"><span class="cidx">${m.idx}</span><span class="ctitle">${m.title}</span></div>`;
  if(m.fns && m.fns.length){
    inner += `<div class="fnlist">${m.fns.map(f=>`<div class="fn">${f}</div>`).join('')}</div>`;
  }
  if(m.subs){
    m.subs.forEach(s=>{
      inner += `<div class="submod"><div class="shead"><span>${s.name}</span><span class="stoggle">▼</span></div><div class="sbody">${s.fns.map(f=>`<div class="fn">${f}</div>`).join('')}</div></div>`;
    });
  }
  card.innerHTML = inner;
  card.querySelectorAll('.submod>.shead').forEach(h=>{
    h.addEventListener('click',()=>{
      h.parentElement.classList.toggle('collapsed');
    });
  });
  grid.appendChild(card);
});
</script>
</body>
</html>
